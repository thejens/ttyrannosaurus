<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Background -->
  <rect width="128" height="128" rx="22" fill="#0e1117"/>

  <!-- Tail -->
  <polygon points="10,66 24,54 28,68 16,74" fill="#4ec9b0"/>

  <!-- Body -->
  <ellipse cx="46" cy="72" rx="24" ry="20" fill="#4ec9b0"/>

  <!-- Neck -->
  <rect x="64" y="46" width="14" height="22" rx="5" fill="#4ec9b0"/>

  <!-- Head (skull) -->
  <rect x="72" y="16" width="48" height="32" rx="6" fill="#4ec9b0"/>

  <!-- Lower jaw -->
  <rect x="82" y="44" width="40" height="14" rx="5" fill="#3aac96"/>

  <!-- Mouth gap (dark) -->
  <rect x="86" y="42" width="32" height="10" rx="3" fill="#0e1117"/>

  <!-- Upper teeth -->
  <polygon points="89,42 92,36 95,42" fill="#f0f0f0"/>
  <polygon points="97,42 100,36 103,42" fill="#f0f0f0"/>
  <polygon points="105,42 108,36 111,42" fill="#f0f0f0"/>

  <!-- Terminal cursor in mouth (bright, blinks in practice) -->
  <rect x="87" y="45" width="5" height="6" rx="1" fill="#7de8cd"/>

  <!-- Eye socket -->
  <circle cx="102" cy="27" r="5" fill="#0e1117"/>
  <!-- Eye glint -->
  <circle cx="103.5" cy="25.5" r="1.5" fill="#7de8cd"/>

  <!-- Arm (tiny — the defining T-Rex feature) -->
  <rect x="68" y="66" width="13" height="8" rx="3" fill="#3aac96"/>
  <rect x="79" y="62" width="8" height="6" rx="2" fill="#3aac96"/>

  <!-- Front leg -->
  <rect x="32" y="88" width="14" height="18" rx="4" fill="#3aac96"/>
  <rect x="26" y="102" width="22" height="8" rx="3" fill="#3aac96"/>

  <!-- Rear leg -->
  <rect x="50" y="88" width="14" height="18" rx="4" fill="#3aac96"/>
  <rect x="50" y="102" width="18" height="8" rx="3" fill="#3aac96"/>
</svg>
