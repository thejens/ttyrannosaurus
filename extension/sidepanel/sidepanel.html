<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>ttyrannosaurus</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #1a1a1a;
      --surface: #242424;
      --surface2: #2e2e2e;
      --border: #3a3a3a;
      --text: #d4d4d4;
      --text-dim: #888;
      --accent: #4a9eff;
      --green: #4ec9b0;
      --red: #f48771;
      --drag-over: #4a9eff33;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, sans-serif; font-size: 13px; }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px 8px;
      border-bottom: 1px solid var(--border);
    }
    header h1 { font-size: 12px; font-weight: 600; color: var(--text-dim); letter-spacing: 0.08em; text-transform: uppercase; flex: 1; }
    .new-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 4px 10px;
      font-size: 12px;
      cursor: pointer;
      font-weight: 500;
    }
    .new-btn:hover { filter: brightness(1.15); }
    .settings-btn {
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      padding: 3px 5px;
      border-radius: 3px;
    }
    .settings-btn:hover { background: var(--surface2); color: var(--text); }

    /* ── New session picker ── */
    #new-picker {
      display: none;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    #new-picker.open { display: block; }
    #new-picker label { display: block; font-size: 11px; color: var(--text-dim); margin-bottom: 6px; }
    .scheme-list { display: flex; flex-wrap: wrap; gap: 6px; }
    .scheme-pill {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 3px 10px;
      font-size: 12px;
      cursor: pointer;
      color: var(--text);
    }
    .scheme-pill:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

    /* ── Session list ── */
    #sessions { flex: 1; overflow-y: auto; padding: 6px 0; }

    .session-card {
      margin: 1px 8px;
      border-radius: 5px;
      padding: 7px 10px;
      cursor: pointer;
      border: 1px solid transparent;
      transition: background 0.1s;
      position: relative;
    }
    .session-card:hover { background: var(--surface2); }
    .session-card.active { background: var(--surface2); border-color: var(--accent); }
    .session-card.drag-over { border-color: var(--accent); background: var(--drag-over); }
    .session-card.drag-over-split-left  { border-left:  2px solid var(--accent); }
    .session-card.drag-over-split-right { border-right: 2px solid var(--accent); }
    .session-card[draggable="true"] { cursor: grab; }

    .card-top { display: flex; align-items: center; gap: 6px; }
    .dot {
      width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
      background: var(--text-dim);
      transition: background 0.3s;
    }
    .dot.alive              { background: var(--green); }
    .dot.dead               { background: var(--red); }
    .dot.dormant            { background: var(--text-dim); }
    .dot.status-busy        { background: var(--accent); }
    .dot.status-error       { background: var(--red); }
    .dot.status-waiting     { background: #f0a500; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .dot.status-busy        { animation: pulse 1.4s ease-in-out infinite; }
    .card-path { font-weight: 500; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .card-age  {
      font-size: 11px; color: var(--text-dim); white-space: nowrap;
      min-width: 28px; text-align: right; font-variant-numeric: tabular-nums;
    }
    .card-state {
      font-size: 10px;
      color: var(--text-dim);
      background: var(--surface2);
      border-radius: 3px;
      padding: 1px 5px;
      white-space: nowrap;
    }
    .card-state.in-tab { color: var(--accent); background: #4a9eff1a; }

    /* Last output line preview */
    .shared-badge {
      font-size: 11px;
      color: var(--accent);
      opacity: 0.8;
      flex-shrink: 0;
    }
    .card-preview {
      margin-top: 3px;
      font-size: 11px;
      color: var(--text-dim);
      font-family: monospace;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      line-height: 1.4;
    }
    .card-preview.status-waiting { color: #e8a030; }
    .card-preview.status-error   { color: var(--red); }
    .card-cwd {
      margin-top: 2px;
      font-size: 11px;
      color: var(--text-dim);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-family: monospace;
    }
    .sub-prog {
      opacity: 0.7;
      background: var(--surface2);
      border-radius: 2px;
      padding: 0 3px;
      font-size: 9px;
      vertical-align: middle;
    }

    /* Kill button — always occupies space but invisible until hover */
    .kill-btn {
      visibility: hidden;
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 13px;
      line-height: 1;
      padding: 2px 4px;
      border-radius: 3px;
      flex-shrink: 0;
    }
    .session-card:hover .kill-btn { visibility: visible; }
    .kill-btn:hover { color: var(--red); background: var(--surface2); }

    /* Empty state */
    .empty {
      text-align: center;
      color: var(--text-dim);
      padding: 32px 16px;
      line-height: 1.7;
      font-size: 12px;
    }
    .empty strong { color: var(--text); }

    /* Offline banner */
    .offline-banner {
      background: #e3330020;
      border-bottom: 1px solid #e3330040;
      padding: 6px 12px;
      font-size: 11px;
      color: var(--red);
      display: none;
    }
    .offline-banner.show { display: block; }

    /* ── Context menu ── */
    .ctx-menu {
      position: fixed;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px;
      z-index: 1000;
      box-shadow: 0 6px 16px rgba(0,0,0,0.5);
      display: none;
      min-width: 120px;
    }
    .ctx-menu.show { display: block; }
    .ctx-item {
      display: block;
      width: 100%;
      background: none;
      border: none;
      color: var(--text);
      padding: 6px 12px;
      text-align: left;
      font-size: 13px;
      cursor: pointer;
      border-radius: 4px;
      font-family: inherit;
    }
    .ctx-item:hover { background: var(--surface2); }

    /* ── Inline rename input ── */
    .rename-input {
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--accent);
      border-radius: 0;
      color: var(--text);
      font-size: 13px;
      font-weight: 500;
      padding: 0 2px;
      outline: none;
      flex: 1;
      min-width: 0;
      font-family: inherit;
    }

    body { display: flex; flex-direction: column; }
    main { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
  </style>
</head>
<body>
  <header>
    <h1>ttyrannosaurus</h1>
    <button class="new-btn" id="new-btn">+ New</button>
    <button class="settings-btn" id="settings-btn" title="Settings">⚙</button>
  </header>

  <div class="offline-banner" id="offline-banner">
    Daemon offline — <a href="https://github.com/thejens/ttyrannosaurus" style="color:inherit">start ttyrannosaurus</a>
  </div>

  <!-- Context menu (shared, repositioned on each right-click) -->
  <div id="ctx-menu" class="ctx-menu">
    <button class="ctx-item" id="ctx-rename">Rename</button>
  </div>

  <main>
    <div id="sessions"></div>
  </main>

  <script src="../protocol.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
